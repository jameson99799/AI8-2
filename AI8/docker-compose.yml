services:
  ai8-adapter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai8-adapter
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AI8_CONFIG_PATH: /app/data/config.json
      AI8_LOG_PATH: /app/logs/ai8-adapter.log
    ports:
      - "7862:7862"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
