<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI8 适配器后台</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="hero">
            <div>
                <p class="eyebrow">AI8 适配器</p>
                <h1>管理后台</h1>
                <p class="hero-copy">
                    这个页面只用于管理配置、检查上游连通性、查看模型和日志。
                    实际对话依然只通过 OpenAI 兼容 API 转发，不提供聊天前台。
                </p>
            </div>
            <div class="hero-card">
                <div class="hero-stat">
                    <span class="hero-label">鉴权模式</span>
                    <strong id="adminModeValue">未登录</strong>
                </div>
                <div class="hero-stat">
                    <span class="hero-label">API 地址</span>
                    <strong id="openaiBaseValue">-</strong>
                </div>
                <button id="logoutButton" class="ghost-button" type="button">清除登录令牌</button>
            </div>
        </header>

        <main class="grid">
            <section class="panel">
                <div class="panel-head">
                    <div>
                        <p class="panel-kicker">登录</p>
                        <h2>后台登录</h2>
                    </div>
                </div>
                <form id="loginForm" class="stack">
                    <label class="field">
                        <span>后台令牌</span>
                        <input id="adminTokenInput" autocomplete="off" placeholder="ADMIN_TOKEN / API_KEYS / 自动生成令牌" type="password">
                    </label>
                    <div class="button-row">
                        <button class="primary-button" type="submit">进入后台</button>
                        <button id="reloadButton" class="ghost-button" type="button">重新加载</button>
                    </div>
                    <p class="muted">
                        页面会默认尝试使用预填后台令牌自动登录。你的客户端仍然应该只调用 <code>/v1/chat/completions</code>。
                    </p>
                </form>
                <div id="statusBanner" class="status-banner">正在准备后台登录信息。</div>
            </section>

            <section class="panel">
                <div class="panel-head">
                    <div>
                        <p class="panel-kicker">运行状态</p>
                        <h2>服务概览</h2>
                    </div>
                    <button id="testButton" class="ghost-button" type="button">测试 AI8 上游</button>
                </div>
                <dl id="runtimeGrid" class="info-grid"></dl>
            </section>

            <section class="panel panel-wide">
                <div class="panel-head">
                    <div>
                        <p class="panel-kicker">配置</p>
                        <h2>运行时设置</h2>
                    </div>
                    <button id="saveConfigButton" class="primary-button" type="button">保存配置</button>
                </div>
                <form id="configForm" class="config-grid">
                    <label class="field field-span-2">
                        <span>AI8 授权令牌</span>
                        <input id="ai8AuthToken" autocomplete="off" type="password">
                    </label>
                    <label class="field field-span-2">
                        <span>本地 API 密钥</span>
                        <input id="apiKeys" autocomplete="off" placeholder="key-a,key-b">
                    </label>
                    <label class="field field-span-2">
                        <span>后台令牌</span>
                        <input id="adminTokenConfig" autocomplete="off" type="password">
                    </label>
                    <label class="field field-span-2">
                        <span>AI8 接口地址</span>
                        <input id="ai8BaseUrl" placeholder="https://ai8.rcouyi.com/api">
                    </label>
                    <label class="field field-span-2">
                        <span>默认模型</span>
                        <input id="ai8DefaultModel" placeholder="openai_chat::gpt-4.1-mini">
                    </label>
                    <label class="field field-span-2">
                        <span>固定复用的 AI8 会话 ID</span>
                        <input id="ai8SharedSessionId" inputmode="numeric" placeholder="可选，填入后默认复用同一个 AI8 对话">
                    </label>
                    <label class="field checkbox-field field-span-2">
                        <input id="ai8UseSharedSession" type="checkbox">
                        <span>启用固定共享会话</span>
                    </label>
                    <label class="field checkbox-field field-span-2">
                        <input id="ai8DeleteSessionAfterResponse" type="checkbox">
                        <span>每次新建会话后，在返回结果后自动删除该 AI8 会话</span>
                    </label>
                    <label class="field checkbox-field field-span-2">
                        <input id="ai8ReuseSessionInjectSystemPrompt" type="checkbox">
                        <span>共享会话时，把第三方的角色提示词一并注入本轮消息</span>
                    </label>
                    <label class="field">
                        <span>请求超时毫秒</span>
                        <input id="ai8RequestTimeoutMs" inputmode="numeric" type="number">
                    </label>
                    <label class="field">
                        <span>图片抓取超时毫秒</span>
                        <input id="mediaFetchTimeoutMs" inputmode="numeric" type="number">
                    </label>
                    <label class="field">
                        <span>X-APP-VERSION</span>
                        <input id="ai8XAppVersion">
                    </label>
                    <label class="field">
                        <span>请求体大小限制</span>
                        <input id="requestBodyLimit" placeholder="50mb">
                    </label>
                    <label class="field field-span-2">
                        <span>对外访问地址覆盖</span>
                        <input id="publicBaseUrl" placeholder="https://你的域名.example">
                    </label>
                    <label class="field checkbox-field field-span-2">
                        <input id="ai8DefaultThinking" type="checkbox">
                        <span>默认开启 AI8 thinking 模式</span>
                    </label>
                </form>
            </section>

            <section class="panel">
                <div class="panel-head">
                    <div>
                        <p class="panel-kicker">模型</p>
                        <h2>AI8 模型列表</h2>
                    </div>
                    <button id="refreshModelsButton" class="ghost-button" type="button">刷新模型</button>
                </div>
                <div id="modelsMeta" class="muted">尚未加载模型。</div>
                <div id="modelsList" class="tag-cloud"></div>
            </section>

            <section class="panel panel-wide">
                <div class="panel-head">
                    <div>
                        <p class="panel-kicker">日志</p>
                        <h2>运行日志尾部</h2>
                    </div>
                    <button id="refreshLogsButton" class="ghost-button" type="button">刷新日志</button>
                </div>
                <pre id="logsOutput" class="log-box">尚未加载日志。</pre>
            </section>

            <section class="panel panel-wide">
                <div class="panel-head">
                    <div>
                        <p class="panel-kicker">调用示例</p>
                        <h2>API 连接示例</h2>
                    </div>
                </div>
                <pre id="exampleOutput" class="code-box">登录后会在这里生成 curl 调用示例。</pre>
            </section>
        </main>
    </div>

    <script src="./app.js"></script>
</body>
</html>
