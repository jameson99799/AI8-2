services:
  ai8-hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai8-hub
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 7865
      AI8_CONFIG_PATH: /app/data/config.json
      AI8_LOG_PATH: /app/logs/ai8-hub.log
    ports:
      - "7865:7865"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
